name: 🚀 Publish Package

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️  Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️  Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      # npm ci is strict-lockfile-enforced and matches the install idiom
      # used by sibling publishing workflows (@civitas-cerebrum/element-repository,
      # @civitas-cerebrum/element-interactions). package-lock.json is committed
      # to the repo so the deterministic install works on the CI runner.
      # Dev deps ARE installed: the pre-publish `test:hooks` step runs
      # `build:validator`, which imports `esbuild` (a devDependency) to bundle
      # the self-contained validator. Omitting dev deps breaks that build. Dev
      # deps never reach the published tarball anyway — `files:` in package.json
      # governs the tarball, not node_modules.
      # --ignore-scripts skips the package's own postinstall (which copies
      # hooks + skills into ~/.claude/ — not what we want on the CI runner).
      - name: 🧩  Install dependencies (incl. dev — esbuild needed to build the validator)
        run: npm ci --ignore-scripts

      - name: 🔎  Schemas lint
        run: npm run schemas:lint

      - name: 🧪  Hook tests
        run: npm run test:hooks

      # --ignore-scripts skips prepack (which would re-run test:hooks)
      # and any other lifecycle scripts on the publisher side.
      - name: 📦  Publish Package
        run: npm publish --ignore-scripts --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
