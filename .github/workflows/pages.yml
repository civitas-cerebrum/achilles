name: 🌐 Deploy GitHub Pages

# Production deploy. Publishes docs/ to the ROOT of the gh-pages branch.
# GitHub Pages must be configured to serve from the gh-pages branch
# (Settings → Pages → Build and deployment → Deploy from a branch →
# gh-pages / (root)). The branch model is required so per-PR previews
# (see pr-preview.yml) can be served from gh-pages/pr-preview/pr-<N>/
# alongside the production site.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🗂️  Checkout
        uses: actions/checkout@v4

      - name: 🚀  Publish docs/ to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
          # Never wipe in-flight PR previews on a production deploy.
          clean-exclude: |
            pr-preview/
