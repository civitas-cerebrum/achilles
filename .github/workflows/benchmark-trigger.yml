name: 🧪 Benchmark trigger

# Fires repository_dispatch to bookhive-benchmark on every PR and immediately
# sets a `bookhive-benchmark` commit status to "pending" on the PR head. The
# benchmark run (in civitas-cerebrum/bookhive-benchmark) re-posts that same
# status context with its real result (success / failure) when it finishes —
# so the PR carries a live, honest status that stays pending while the
# (long-running) benchmark executes, instead of a fire-and-forget trigger.
#
# Why commit status, not a check run: the benchmark reports back with a classic
# PAT, and classic PATs cannot create check runs — but they can post commit
# statuses (repo:status). Re-posting the same `context` updates it in place.
#
# Secrets:
#   BENCHMARK_DISPATCH_TOKEN — PAT with `contents: write` on
#     civitas-cerebrum/bookhive-benchmark (to send the repository_dispatch).
#   The pending status below uses the workflow's own GITHUB_TOKEN
#     (statuses: write on this repo) — no PAT needed for that part.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write        # set the pending benchmark status on the PR head
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch benchmark run
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BENCHMARK_DISPATCH_TOKEN }}
          repository: civitas-cerebrum/bookhive-benchmark
          event-type: achilles-pr
          client-payload: |
            {"pr_number":"${{ github.event.pull_request.number }}",
             "head_sha":"${{ github.event.pull_request.head.sha }}",
             "achilles_ref":"${{ github.event.pull_request.head.ref }}",
             "achilles_repo":"${{ github.repository }}"}

      - name: Mark benchmark status pending on the PR head
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state='pending' \
            -f context='bookhive-benchmark' \
            -f description='Benchmark running… (can take a while)' \
            >/dev/null
