name: 🧪 Benchmark trigger

# Fires repository_dispatch to bookhive-benchmark on every PR, so the benchmark
# CI run can post its results back here.
# Requires the secret BENCHMARK_DISPATCH_TOKEN: a PAT with `contents: write` on
# civitas-cerebrum/bookhive-benchmark (enough to send a repository_dispatch).

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BENCHMARK_DISPATCH_TOKEN }}
          repository: civitas-cerebrum/bookhive-benchmark
          event-type: achilles-pr
          client-payload: |
            {"pr_number":"${{ github.event.pull_request.number }}",
             "head_sha":"${{ github.event.pull_request.head.sha }}",
             "achilles_ref":"${{ github.event.pull_request.head.ref }}",
             "achilles_repo":"${{ github.repository }}"}
