name: 🧪 Benchmark trigger

# Fires repository_dispatch to bookhive-benchmark on every PR. The benchmark
# run owns the PR's `bookhive-benchmark` commit status end to end: it sets the
# status to pending when it starts and — on always() — resolves it to the real
# result (success / failure / error) when it finishes. We deliberately do NOT
# set a pending status here: a status this trigger can set but cannot resolve
# is what leaves a stuck-yellow check when the benchmark pipeline actually
# failed. Ownership lives with the side that knows the outcome.
#
# Secrets:
#   BENCHMARK_DISPATCH_TOKEN — PAT with `contents: write` on
#     civitas-cerebrum/bookhive-benchmark (to send the repository_dispatch).

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch benchmark run
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BENCHMARK_DISPATCH_TOKEN }}
          repository: civitas-cerebrum/bookhive-benchmark
          event-type: achilles-pr
          client-payload: |
            {"pr_number":"${{ github.event.pull_request.number }}",
             "head_sha":"${{ github.event.pull_request.head.sha }}",
             "achilles_ref":"${{ github.event.pull_request.head.ref }}",
             "achilles_repo":"${{ github.repository }}"}
